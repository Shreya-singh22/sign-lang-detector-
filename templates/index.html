<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGN Language</title>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    
    <!-- Include the Sketch.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sketch.js/0.3.1/sketch.min.js"></script>
</head>
<body>
    <div id="header">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg bg-transparent">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">SignLanguage</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto me-5">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="/">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/dataset">Dataset</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="https://github.com/NalinThakur/Ai_project" target="_blank">Repo</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <!-- main section  -->
    <div class="container" style="margin: 0; padding: 0;">
        <div class="row justify-content-md-center ">
          <div class="col col-lg-6 landing-text">
            <h1>Speak Whilst Being Mute</h1>
            <h5>AI Sign Language Detection</h5>
          </div>
          <div class="col col-lg-6 d-flex align-items-center justify-content-center">
            <div class="illustration-container">
              <svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Background circle -->
                <circle cx="250" cy="250" r="200" fill="#E2E8F0" opacity="0.3"/>
                
                <!-- Hand illustration - showing "A" sign -->
                <!-- Palm -->
                <ellipse cx="250" cy="280" rx="60" ry="80" fill="#4A90E2" opacity="0.2"/>
                
                <!-- Thumb -->
                <ellipse cx="200" cy="250" rx="25" ry="50" fill="#4A90E2" transform="rotate(-30 200 250)"/>
                
                <!-- Index finger (pointing up) -->
                <rect x="240" y="150" width="20" height="100" rx="10" fill="#4A90E2"/>
                <circle cx="250" cy="150" r="12" fill="#4A90E2"/>
                
                <!-- Middle finger -->
                <rect x="255" y="160" width="20" height="90" rx="10" fill="#4A90E2" opacity="0.7"/>
                <circle cx="265" cy="160" r="10" fill="#4A90E2" opacity="0.7"/>
                
                <!-- Ring finger -->
                <rect x="270" y="170" width="18" height="80" rx="9" fill="#4A90E2" opacity="0.6"/>
                <circle cx="279" cy="170" r="9" fill="#4A90E2" opacity="0.6"/>
                
                <!-- Pinky -->
                <rect x="285" y="180" width="15" height="70" rx="7.5" fill="#4A90E2" opacity="0.5"/>
                <circle cx="292.5" cy="180" r="7.5" fill="#4A90E2" opacity="0.5"/>
                
                <!-- Wrist -->
                <rect x="230" y="320" width="40" height="30" rx="5" fill="#4A90E2" opacity="0.8"/>
                
                <!-- Decorative elements -->
                <circle cx="150" cy="200" r="8" fill="#4A90E2" opacity="0.3"/>
                <circle cx="350" cy="200" r="8" fill="#4A90E2" opacity="0.3"/>
                <circle cx="150" cy="300" r="6" fill="#4A90E2" opacity="0.2"/>
                <circle cx="350" cy="300" r="6" fill="#4A90E2" opacity="0.2"/>
              </svg>
            </div>
          </div>
    </div> 
  
    <div class="text-center" >
      <a href="/camera" class="button">
          🎥 Start Camera    
      </a>
  </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="https://code.jquery.com/jquery-latest.min.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>
</html>
